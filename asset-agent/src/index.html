<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asset-agent · 融合看板</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0f1a; --surface: #1a1a2e; --border: #1e1e2e;
            --text: #cdd6f4; --subtle: #a6adc8; --muted: #585b70;
            --accent: #89b4fa; --green: #a6e3a1; --orange: #fab387; --red: #f38ba8;
            --font: system-ui, -apple-system, sans-serif;
        }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            height: 100vh; display: flex; overflow: hidden;
        }
        .sidebar {
            width: 280px; min-width: 280px; background: var(--surface);
            border-right: 1px solid var(--border); display: flex;
            flex-direction: column; overflow: hidden;
        }
        .sidebar .head {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        .sidebar .head .tag {
            font-size: 10px; background: var(--bg); color: var(--muted);
            padding: 2px 8px; border-radius: 3px; font-weight: 400;
        }
        .sidebar .search { padding: 10px 16px; border-bottom: 1px solid var(--border); }
        .sidebar .search input {
            width: 100%; padding: 6px 10px; border: 1px solid var(--border);
            border-radius: 4px; background: var(--bg); color: var(--text);
            font-size: 12px; outline: none;
        }
        .sidebar .search input:focus { border-color: var(--accent); }
        .tree { flex: 1; overflow-y: auto; padding: 8px 0; }
        .tree-node {
            font-size: 13px; padding: 4px 16px; cursor: pointer;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
            user-select: none; transition: background 0.1s;
        }
        .tree-node:hover { background: #22223a; }
        .tree-node.sel { background: #2a2a4a; }
        .tree-node .icon { width: 18px; text-align: center; font-size: 14px; }
        .tree-node .lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .tree-node .badge {
            font-size: 10px; background: var(--bg); color: var(--accent);
            padding: 1px 6px; border-radius: 3px; flex-shrink: 0;
        }
        .tree-node .arr { color: var(--muted); font-size: 10px; width: 14px; text-align: center; transition: transform 0.15s; }
        .tree-node .arr.open { transform: rotate(90deg); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tabs {
            display: flex; border-bottom: 1px solid var(--border);
            background: var(--surface); flex-shrink: 0;
        }
        .tabs .tab {
            padding: 12px 24px; font-size: 13px; cursor: pointer;
            color: var(--muted); border-bottom: 2px solid transparent;
            user-select: none; transition: color 0.1s, border-color 0.1s;
        }
        .tabs .tab:hover { color: var(--text); }
        .tabs .tab.act { color: var(--accent); border-bottom-color: var(--accent); }
        .content { flex: 1; overflow: auto; position: relative; }
        .page { display: none; height: 100%; padding: 20px 24px; }
        .page.act { display: block; }

        .file-list { font-size: 13px; }
        .file-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-bottom: 1px solid #1a1a2e;
        }
        .file-row .fi { width: 20px; text-align: center; }
        .file-row .fn { flex: 1; }
        .file-row .fa { font-size: 11px; color: var(--muted); }

        #evo-net { width: 100%; height: 100%; }
        .empty-state { color: var(--muted); font-size: 13px; padding: 40px; text-align: center; }

        .audit-list { font-size: 13px; }
        .audit-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-bottom: 1px solid #1a1a2e; cursor: pointer;
            transition: background 0.1s;
        }
        .audit-row:hover { background: #22223a; }
        .audit-row .at { color: var(--muted); font-size: 12px; width: 60px; }
        .audit-row .aa { width: 80px; }
        .audit-row .atk { width: 60px; text-align: right; }
        .audit-row .aw { width: 50px; text-align: right; }
        .audit-row .ab { width: 80px; text-align: center; font-size: 12px; }
        .audit-row .ab.ok { color: var(--green); }
        .audit-row .ab.warn { color: var(--red); }
        .audit-row .aw.warn { color: var(--orange); font-weight: 600; }
        .audit-detail { display: none; padding: 12px 12px 12px 40px; background: #14141f; font-size: 12px; }
        .audit-detail.open { display: block; }
        .audit-detail table { width: 100%; border-collapse: collapse; }
        .audit-detail td { padding: 4px 8px; border-bottom: 1px solid #1e1e2e; }
        .audit-detail td:nth-child(2) { text-align: right; }
        .audit-detail td:nth-child(3) { text-align: right; }
        .audit-detail .ok { color: var(--green); }
        .audit-detail .waste { color: var(--orange); }
        .audit-detail .low { color: var(--muted); }

        .cfg { font-size: 13px; max-width: 600px; }
        .cfg .sec { margin-bottom: 20px; }
        .cfg .cl { color: var(--muted); margin-bottom: 6px; }
        .cfg .cv {
            background: var(--surface); padding: 8px 12px; border-radius: 4px;
            font-family: monospace; font-size: 12px; white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="head">📁 asset-agent <span class="tag">融合版</span></div>
    <div class="search"><input id="tree-search" placeholder="搜索目录..." oninput="filterTree(this.value)"></div>
    <div class="tree" id="tree"></div>
</div>

<div class="main">
    <div class="tabs">
        <div class="tab act" onclick="switchTab('structure')">结构</div>
        <div class="tab" onclick="switchTab('evolution')">演化</div>
        <div class="tab" onclick="switchTab('audit')">审计</div>
        <div class="tab" onclick="switchTab('config')">配置</div>
    </div>
    <div class="content">
        <div class="page act" id="p-structure"><div class="file-list" id="file-list"><div class="empty-state">选择一个目录查看资产</div></div></div>
        <div class="page" id="p-evolution"><div id="evo-net"><div class="empty-state">选择一个项目查看版本演化</div></div></div>
        <div class="page" id="p-audit"><div class="audit-list" id="audit-list"><div class="empty-state">选择项目后查看调用审计</div></div></div>
        <div class="page" id="p-config"><div class="cfg" id="cfg-area"><div class="empty-state">选择智能体查看边界配置</div></div></div>
    </div>
</div>

<script>
/* ======== 样本数据 ======== */
window.graphData = {
    graphNodes: [
        { id: 'root', label: '元仓库', group: 'Dir', parent: null },
        { id: 'dir-platform', label: '平台', group: 'Dir', parent: 'root' },
        { id: 'dir-docs', label: 'docs', group: 'Dir', parent: 'dir-platform' },
        { id: 'dir-src', label: 'src', group: 'Dir', parent: 'dir-platform' },
        { id: 'dir-test', label: 'test', group: 'Dir', parent: 'dir-platform' },
        { id: 'dir-examples', label: '示例', group: 'Dir', parent: 'root' },
        { id: 'drd-agent', label: 'drd-agent', group: 'Agent', parent: 'dir-docs' },
        { id: 'code-frontend-agent', label: 'code-frontend-agent', group: 'Agent', parent: 'dir-src' },
        { id: 'code-backend-agent', label: 'code-backend-agent', group: 'Agent', parent: 'dir-src' },
        { id: 'qa-agent', label: 'qa-agent', group: 'Agent', parent: 'dir-test' },
        { id: 'file-drd-pay', label: '支付设计.md', group: 'File', parent: 'dir-docs' },
        { id: 'file-drd-arch', label: '架构决策.md', group: 'File', parent: 'dir-docs' },
        { id: 'file-src-pay', label: 'payment.ts', group: 'File', parent: 'dir-src' },
        { id: 'file-test-pay', label: 'payment.test.ts', group: 'File', parent: 'dir-test' },
        { id: 'drd-agent-v1', label: 'DRD v1', group: 'Version', parent: 'dir-docs' },
        { id: 'drd-agent-v2', label: 'DRD v2', group: 'Version', parent: 'dir-docs' },
        { id: 'drd-agent-v3', label: 'DRD v3', group: 'Version', parent: 'dir-docs' },
        { id: 'code-frontend-agent-v1', label: '前端 v1', group: 'Version', parent: 'dir-src' },
        { id: 'code-frontend-agent-v2', label: '前端 v2', group: 'Version', parent: 'dir-src' },
        { id: 'code-backend-agent-v1', label: '后端 v1', group: 'Version', parent: 'dir-src' },
        { id: 'code-backend-agent-v2', label: '后端 v2', group: 'Version', parent: 'dir-src' },
    ],
    graphEdges: [
        { id: 'write-1', from: 'drd-agent', to: 'file-drd-pay', type: 'write', label: '写入', events: [] },
        { id: 'write-2', from: 'drd-agent', to: 'file-drd-arch', type: 'write', label: '写入', events: [] },
        { id: 'write-3', from: 'code-frontend-agent', to: 'file-src-pay', type: 'write', label: '写入', events: [] },
        { id: 'write-4', from: 'qa-agent', to: 'file-test-pay', type: 'write', label: '写入', events: [] },
        { id: 'tr-1', from: 'drd-agent-v1', to: 'code-frontend-agent-v1', type: 'trigger', label: '触发', events: [] },
        { id: 'tr-2', from: 'drd-agent-v1', to: 'code-backend-agent-v1', type: 'trigger', label: '触发', events: [] },
        { id: 'fb-1', from: 'code-frontend-agent-v1', to: 'drd-agent-v2', type: 'feedback', label: '反馈', events: [] },
        { id: 'fb-2', from: 'code-backend-agent-v1', to: 'drd-agent-v2', type: 'feedback', label: '反馈', events: [] },
        { id: 'tr-3', from: 'drd-agent-v2', to: 'code-frontend-agent-v2', type: 'trigger', label: '触发', events: [] },
        { id: 'tr-4', from: 'drd-agent-v2', to: 'code-backend-agent-v2', type: 'trigger', label: '触发', events: [] },
        { id: 'tr-5', from: 'drd-agent-v3', to: 'code-frontend-agent-v2', type: 'trigger', label: '触发（收敛）', events: [] },
        { id: 'tr-6', from: 'drd-agent-v3', to: 'code-backend-agent-v2', type: 'trigger', label: '触发（收敛）', events: [] },
    ]
};

window.auditData = [
    { time: '14:30:05', agent: 'drd-agent', tokens: 8230, trigger: '支付设计.md (finalized)', wasteRate: 38, violation: false, files: [{ icon: '📄', name: '支付设计.md', tokens: 3200, status: 'ok' }, { icon: '📄', name: '架构决策.md', tokens: 1800, status: 'ok' }, { icon: '📄', name: '平台技术选型.md', tokens: 2300, status: 'waste' }] },
    { time: '14:32:10', agent: 'code-frontend-agent', tokens: 12500, trigger: 'drd.finalized → DRD v2', wasteRate: 52, violation: true, files: [{ icon: '📄', name: 'payment.ts', tokens: 4200, status: 'ok' }, { icon: '📄', name: '支付设计.md', tokens: 3200, status: 'ok' }, { icon: '📄', name: '退款设计.md', tokens: 2800, status: 'low' }, { icon: '📄', name: '用户管理设计.md', tokens: 2300, status: 'waste' }] },
    { time: '14:35:22', agent: 'code-backend-agent', tokens: 5100, trigger: 'drd.finalized → DRD v2', wasteRate: 12, violation: false, files: [{ icon: '📄', name: 'payment.go', tokens: 2400, status: 'ok' }, { icon: '📄', name: 'api.go', tokens: 1600, status: 'ok' }, { icon: '📄', name: 'db.go', tokens: 1100, status: 'ok' }] },
];

/* ======== 全局状态 ======== */
let graphNodes = window.graphData.graphNodes;
let graphEdges = window.graphData.graphEdges;
let selectedDirId = 'root';
let treeFlat = [];

/* ======== 资产树 ======== */
function buildTree() {
    const root = graphNodes.find(n => n.parent === null && n.group === 'Dir');
    if (!root) return;
    treeFlat = [];
    renderTree(root, document.getElementById('tree'), 0);
    selectDir(root.id);
}

function renderTree(node, container, level) {
    const div = document.createElement('div');
    div.className = 'tree-node';
    div.dataset.id = node.id;
    div.style.paddingLeft = (level * 16 + 16) + 'px';
    const dirs = graphNodes.filter(n => n.parent === node.id && n.group === 'Dir');
    const agents = graphNodes.filter(n => n.parent === node.id && n.group === 'Agent');
    const arr = document.createElement('span');
    arr.className = 'arr' + (dirs.length ? ' open' : '');
    arr.textContent = '▶';
    div.appendChild(arr);
    const ic = document.createElement('span');
    ic.className = 'icon'; ic.textContent = '📁';
    div.appendChild(ic);
    const lb = document.createElement('span');
    lb.className = 'lbl'; lb.textContent = node.label;
    div.appendChild(lb);
    agents.forEach(a => {
        const b = document.createElement('span');
        b.className = 'badge';
        b.textContent = a.label.replace('-agent', '').replace('code-', '').replace('frontend', '前端').replace('backend', '后端');
        div.appendChild(b);
    });
    div.onclick = () => selectDir(node.id);
    container.appendChild(div);
    treeFlat.push({ id: node.id, el: div, label: node.label });
    dirs.forEach(c => renderTree(c, container, level + 1));
}

function selectDir(id) {
    selectedDirId = id;
    document.querySelectorAll('.tree-node').forEach(el => el.classList.remove('sel'));
    const el = document.querySelector(`.tree-node[data-id="${id}"]`);
    if (el) el.classList.add('sel');
    showStructure(id);
    switchTab('structure');
}

function filterTree(v) {
    treeFlat.forEach(i => i.el.style.display = v ? (i.label.includes(v) ? '' : 'none') : '');
}

/* ======== 标签切换 ======== */
let currentTab = 'structure';
function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('act'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('act'));
    document.querySelectorAll(`.tab`)[['structure','evolution','audit','config'].indexOf(name)].classList.add('act');
    document.getElementById('p-' + name).classList.add('act');
    if (name === 'evolution') initEvolution();
    if (name === 'audit') showAudit();
    if (name === 'config') showConfig();
}

/* ======== 结构 ======== */
function showStructure(dirId) {
    const files = graphNodes.filter(n => n.parent === dirId && n.group === 'File');
    const el = document.getElementById('file-list');
    if (!files.length) { el.innerHTML = '<div class="empty-state">该目录下没有文件</div>'; return; }
    el.innerHTML = files.map(f => {
        const a = graphNodes.find(n => n.group === 'Agent' && n.parent === dirId);
        return `<div class="file-row"><span class="fi">📄</span><span class="fn">${f.label}</span><span class="fa">${a ? a.label.replace('-agent','').replace('code-','').replace('frontend','前端').replace('backend','后端') : '—'}</span></div>`;
    }).join('');
}

/* ======== 演化 ======== */
let evoDone = false;
function initEvolution() {
    if (evoDone) return;
    const vers = graphNodes.filter(n => n.group === 'Version');
    if (!vers.length) return;
    evoDone = true;
    const el = document.getElementById('evo-net');
    el.innerHTML = '';
    const netDiv = document.createElement('div');
    netDiv.style.width = '100%'; netDiv.style.height = '100%';
    el.appendChild(netDiv);
    const vn = new vis.DataSet(), ve = new vis.DataSet();
    const cm = { 'drd-agent': 0, 'code-frontend-agent': -1, 'code-backend-agent': 1 };
    const cl = { 'drd-agent': 'DRD', 'code-frontend-agent': '前端', 'code-backend-agent': '后端' };
    const xg = 280, yg = 160;
    vers.forEach(n => {
        const m = n.id.match(/^(.+)-v(\d+)$/);
        if (!m) return;
        const x = (cm[m[1]] || 0) * xg, y = (parseInt(m[2])-1) * yg;
        vn.add({ id: n.id, label: (cl[m[1]]||m[1])+' v'+m[2], group: 'Version', x, y, fixed: true });
    });
    graphEdges.filter(e => e.from.includes('-v') && e.to.includes('-v')).forEach(e => {
        const t = e.type === 'trigger';
        ve.add({ id: e.id, from: e.from, to: e.to, arrows: 'to', color: t ? '#89b4fa' : '#fab387', dashes: !t, width: 2, font: { size: 11, color: '#a6adc8', strokeWidth: 0 }, smooth: { type: 'cubicBezier', roundness: 0.3 } });
    });
    new vis.Network(netDiv, { nodes: vn, edges: ve }, {
        physics: false, interaction: { dragNodes: true, zoomView: true, dragView: true },
        groups: { Version: { shape: 'box', color: { background: '#313244', border: '#89b4fa', highlight: { background: '#3a3b5a', border: '#89b4fa' } }, font: { color: '#cdd6f4', size: 14 }, borderWidth: 2, margin: 10 } }
    }).fit({ animation: false });
}

/* ======== 审计 ======== */
function showAudit() {
    const container = document.getElementById('audit-list');
    const logs = window.auditData || [];
    if (!logs.length) { container.innerHTML = '<div class="empty-state">暂无审计记录</div>'; return; }
    container.innerHTML = logs.map((l,i) => `
        <div class="audit-row" onclick="document.getElementById('ad-${i}').classList.toggle('open')">
            <span class="at">${l.time}</span>
            <span class="aa">${l.agent}</span>
            <span class="atk">${l.tokens}</span>
            <span class="aw ${(l.wasteRate||0)>50?'warn':''}">${l.wasteRate}%</span>
            <span class="ab ${l.violation?'warn':'ok'}">${l.violation?'🔴 越权':'✅ 正常'}</span>
        </div>
        <div class="audit-detail" id="ad-${i}">
            <table>${(l.files||[]).map(f => `<tr><td>${f.icon||'📄'} ${f.name}</td><td>${f.tokens}</td><td class="${f.status}">${f.status==='ok'?'✅ 引用':f.status==='waste'?'⚠️ 浪费':'🔽 低效'}</td></tr>`).join('')}</table>
        </div>
    `).join('');
}

/* ======== 配置 ======== */
function showConfig() {
    const agents = graphNodes.filter(n => n.group === 'Agent');
    const el = document.getElementById('cfg-area');
    if (!agents.length) { el.innerHTML = '<div class="empty-state">无智能体数据</div>'; return; }
    const rules = { 'drd-agent': { path: '平台/docs/drd/', watch: '平台/docs/drd/*.md', files: ['支付设计.md', '架构决策.md'] }, 'code-frontend-agent': { path: '平台/src/', watch: '平台/src/**/*.ts', files: ['payment.ts', '退款.ts'] }, 'code-backend-agent': { path: '平台/src/', watch: '平台/src/**/*.go', files: ['payment.go', 'api.go'] }, 'qa-agent': { path: '平台/test/', watch: '平台/test/**/*.test.ts', files: ['payment.test.ts'] } };
    el.innerHTML = agents.map(a => {
        const r = rules[a.id] || { path: '—', watch: '—', files: [] };
        return `<div class="sec"><div class="cl">${a.label.replace('-agent','').replace('code-','').replace('frontend','前端').replace('backend','后端')}</div><div class="cv">📁 ${r.path}\n👁 ${r.watch}\n📄 ${r.files.length} 个文件</div></div>`;
    }).join('');
}

/* ======== 启动 ======== */
buildTree();
</script>
</body>
</html>
